server:
  port: 8083

spring:
  application:
    name: recommendations-ai-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: ecommerce
    password: ecommerce

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ai_history
    open-in-view: false

  flyway:
    schemas: ai_history
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: recommendations-ai-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.commerce.recommendations.dto.OrderCreatedEvent
        spring.json.trusted.packages: com.commerce.recommendations.dto

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2
          temperature: 0.4

recommendations:
  prompt:
    max-history-orders: 10
    max-recommendations: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
